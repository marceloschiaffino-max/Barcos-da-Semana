<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Barcos da Semana</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0d2d39;--panel:#174b5c;--panel2:#123f4e;--text:#f7f3ec;
      --muted:#a9bac1;--accent:#e28d49;--line:rgba(255,255,255,.15);
      --danger:#a83f3f;--success:#4f7f32
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
    button,input{font:inherit}
    button{border:0;cursor:pointer}
    .app{max-width:1080px;margin:auto;padding:20px 14px 40px}
    .eyebrow{color:var(--accent);font-weight:800;letter-spacing:.16em;font-size:13px}
    h1{font-family:Georgia,serif;font-size:clamp(38px,7vw,64px);margin:8px 0 24px}
    .week{display:grid;grid-template-columns:62px 1fr 62px;gap:10px;align-items:center;padding-bottom:22px;border-bottom:1px solid var(--line)}
    .nav{height:62px;border-radius:16px;background:#173f4e;color:white;font-size:34px}
    .weekText{text-align:center}.weekText b{font-size:26px}.weekText span{display:block;color:var(--muted);margin-top:4px}
    .days{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:24px 0}
    .days button{padding:14px 6px;border-radius:18px;background:#18495a;color:var(--muted)}
    .days button.active{background:var(--accent);color:#171717}
    .days strong{display:block;font-size:25px}.days small{display:block;margin-top:8px;font-size:14px}
    .status{margin:8px 0 16px;color:var(--muted);font-size:13px}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--panel);border-radius:22px;padding:18px;box-shadow:0 14px 35px rgba(0,0,0,.18)}
    .card h2{color:var(--accent);margin:0 0 14px}
    .attendance{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:17px;padding:13px;margin-bottom:14px}
    .attendanceHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .attendanceHead b{font-size:14px;text-transform:uppercase;letter-spacing:.08em}
    .attendanceCount{color:var(--muted);font-size:12px}
    .addRow{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px}
    .addRow input{width:100%;min-width:0;padding:12px 13px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:white;outline:none}
    .addRow input:focus{border-color:var(--accent)}
    .addRow input::placeholder{color:#abc0c8;font-style:italic}
    .addBtn{padding:0 15px;border-radius:12px;background:var(--accent);color:#171717;font-weight:800}
    .pool{min-height:60px;display:flex;flex-wrap:wrap;align-content:flex-start;gap:8px;padding:8px;border:1px dashed rgba(255,255,255,.24);border-radius:13px;transition:.15s}
    .pool.empty::before{content:"Ninguém aguardando barco";color:var(--muted);font-size:13px;font-style:italic;align-self:center}
    .pool.dragover,.seatSlot.dragover{border-color:var(--accent);background:rgba(226,141,73,.12)}
    .athlete{
      min-height:43px;display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding:10px 12px;border-radius:12px;background:var(--accent);color:#171717;
      font-weight:800;cursor:grab;user-select:none;touch-action:manipulation;box-shadow:0 5px 12px rgba(0,0,0,.14)
    }
    .athlete:active{cursor:grabbing}
    .athlete.selected{outline:3px solid #fff;outline-offset:2px}
    .athlete .remove{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:rgba(0,0,0,.15);font-size:14px}
    .boat{padding:15px 0;border-top:1px solid var(--line)}
    .boat:first-of-type{border-top:0}
    .boatTitle{display:flex;justify-content:space-between;gap:10px;margin-bottom:9px}
    .boatTitle span{color:var(--muted);font-size:12px}
    .boat.complete .boatTitle b,.boat.complete .boatTitle span{color:var(--accent)}
    .seats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .single .seats{grid-template-columns:1fr}
    .seat{display:flex;min-width:0}
    .side{min-width:42px;display:grid;place-items:center;background:rgba(255,255,255,.06);border:1px solid var(--line);border-right:0;border-radius:12px 0 0 12px;color:var(--accent);font-weight:bold}
    .seatSlot{
      width:100%;min-width:0;min-height:45px;padding:0;
      border-radius:12px;border:1px dashed rgba(255,255,255,.23);
      background:rgba(255,255,255,.03);display:flex;align-items:stretch;
      transition:.15s;overflow:hidden
    }
    .side+.seatSlot{border-radius:0 12px 12px 0}
    .seatSlot.empty::before{
      content:attr(data-placeholder);padding:13px 14px;color:#abc0c8;
      font-style:italic;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
    }
    .seatSlot .athlete{width:100%;border-radius:10px;box-shadow:none}
    .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
    .actions button{padding:11px 13px;border-radius:12px;background:#173f4e;color:white;border:1px solid var(--line)}
    .actions .primary{background:var(--accent);color:#171717;font-weight:bold}.actions .danger{color:#ffd2d2}
    .note{text-align:center;color:var(--muted);font-size:13px;margin-top:18px}
    .msg{display:none;position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:9999;width:min(92vw,620px);padding:15px 18px;border-radius:14px;background:#245f4d;color:#fff;box-shadow:0 16px 40px rgba(0,0,0,.35);font-weight:700;text-align:center}
    .msg.show{display:block}.msg.error{background:var(--danger);border:1px solid rgba(255,255,255,.25)}
    .hint{font-size:12px;color:var(--muted);margin:8px 0 0}
    @media(max-width:760px){.cards{grid-template-columns:1fr}.days{overflow-x:auto}.days button{min-width:64px}.days strong{font-size:21px}.days small{font-size:12px}}
    @media(max-width:430px){.seats{grid-template-columns:1fr}.actions{display:grid;grid-template-columns:1fr 1fr}.athlete{font-size:14px}}
  </style>
</head>
<body>
<main class="app">
  <div class="eyebrow">ESCALA SEMANAL • FASE 2</div>
  <h1>Barcos da Semana</h1>

  <section class="week">
    <button class="nav" id="prev">‹</button>
    <div class="weekText"><b id="range"></b><span id="month"></span></div>
    <button class="nav" id="next">›</button>
  </section>

  <nav class="days" id="days"></nav>
  <div class="status" id="status">Conectando…</div>
  <div id="msg" class="msg"></div>
  <section class="cards" id="cards"></section>

  <div class="actions">
    <button id="copyPrev">Copiar semana anterior</button>
    <button id="reload">Atualizar</button>
    <button class="primary" id="makeImage">Gerar imagem da semana</button>
    <button class="danger" id="clear">Limpar semana</button>
  </div>

  <p class="note">No computador, arraste o nome. No celular, toque no atleta para selecioná-lo e depois toque no assento desejado ou na lista de presença para devolvê-lo.</p>
</main>
<datalist id="names"></datalist>

<script>
  const SUPABASE_URL="https://gvomrvdoxcvgvvttpnxq.supabase.co";
  const SUPABASE_KEY="sb_publishable_n4kxHGuW2UAHygJLZVyH1A_qjFmorha";
  const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  const DAYS=[
    {k:'tue',s:'3ª',l:'Terça-feira',o:1,times:['06:30','07:30']},
    {k:'wed',s:'4ª',l:'Quarta-feira',o:2,times:['06:30','07:30']},
    {k:'thu',s:'5ª',l:'Quinta-feira',o:3,times:['06:30','07:30']},
    {k:'fri',s:'6ª',l:'Sexta-feira',o:4,times:['06:30','07:30']},
    {k:'sat',s:'SÁB',l:'Sábado',o:5,times:['07:00','08:00']}
  ];
  const BOATS=[
    {k:'4x',l:'4x',n:4},
    {k:'2x',l:'2x',n:2},
    {k:'skiff-yellow',l:'Skiff Amarelo',n:1},
    {k:'skiff-red',l:'Skiff Vermelho',n:1},
    {k:'caravela',l:'Caravela',n:4,sides:['BB','BE','BB','BE']}
  ];
  const ATTENDANCE_TABLE='boat_attendance';

  let monday=getMonday(new Date());
  let active='tue';
  let records=[];
  let attendanceRecords=[];
  let selected=null;
  let dragged=null;

  const $=id=>document.getElementById(id);
  function getMonday(d){d=new Date(d);const day=d.getDay(),diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d}
  function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
  function iso(d){return d.toISOString().slice(0,10)}
  function fmt(d){return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}
  function norm(s){return (s||'').trim().replace(/\s+/g,' ')}
  function sameName(a,b){return norm(a).toLocaleLowerCase('pt-BR')===norm(b).toLocaleLowerCase('pt-BR')}
  function status(t){$('status').textContent=t}
  let messageTimer;
  function message(t,e=false){clearTimeout(messageTimer);const box=$('msg');box.textContent=t;box.className='msg show'+(e?' error':'');messageTimer=setTimeout(()=>box.className='msg',3500)}

  function current(day,time){return records.filter(r=>r.day_key===day&&r.time_key===time)}
  function attendance(day,time){
    const allocatedNames=new Set(
      current(day,time).map(r=>norm(r.athlete_name).toLocaleLowerCase('pt-BR'))
    );
    return attendanceRecords
      .filter(r=>r.day_key===day&&r.time_key===time)
      .filter(r=>!allocatedNames.has(norm(r.athlete_name).toLocaleLowerCase('pt-BR')))
      .sort((a,b)=>a.position-b.position);
  }
  function assigned(day,time,boat,index){return current(day,time).find(r=>r.boat_key===boat&&Number(r.seat_index)===Number(index))}
  function poolIndex(day,time){
    const used=attendanceRecords
      .filter(r=>r.day_key===day&&r.time_key===time)
      .map(r=>Number(r.position)||0);
    let i=0; while(used.includes(i))i++; return i;
  }

  function renderHead(){
    $('range').textContent=`${fmt(monday)} a ${fmt(addDays(monday,5))}`;
    $('month').textContent=monday.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    $('days').innerHTML='';
    DAYS.forEach(d=>{
      const b=document.createElement('button');
      b.className=active===d.k?'active':'';
      b.innerHTML=`<strong>${d.s}</strong><small>${fmt(addDays(monday,d.o))}</small>`;
      b.onclick=()=>{active=d.k;selected=null;renderHead();render()};
      $('days').appendChild(b);
    });
  }

  function athleteChip(record,inPool=false){
    const chip=document.createElement('div');
    chip.className='athlete'+(selected?.id===record.id?' selected':'');
    const canDrag=window.matchMedia('(pointer:fine)').matches;
    chip.draggable=canDrag;
    chip.dataset.id=record.id;
    chip.innerHTML=`<span>${record.athlete_name}</span>${inPool?'<button class="remove" title="Remover presença">×</button>':''}`;

    chip.addEventListener('dragstart',e=>{
      dragged=record;
      selected=null;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',String(record.id));
      setTimeout(()=>chip.style.opacity='.45',0);
    });
    chip.addEventListener('dragend',()=>{dragged=null;chip.style.opacity='';document.querySelectorAll('.dragover').forEach(x=>x.classList.remove('dragover'))});

    chip.addEventListener('click',e=>{
      if(e.target.closest('.remove')){
        e.stopPropagation();
        removePresence(record);
        return;
      }

      e.stopPropagation();

      if(selected?.id===record.id){
        selected=null;
        message('Seleção cancelada.');
      }else{
        selected=record;
        message(`${record.athlete_name} selecionado. Agora toque no destino.`);
      }

      render();
    });
    return chip;
  }

  function makeDropZone(el,onDrop){
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dragover')});
    el.addEventListener('dragleave',()=>el.classList.remove('dragover'));
    el.addEventListener('drop',async e=>{
      e.preventDefault();el.classList.remove('dragover');
      if(dragged)await onDrop(dragged);
    });
    el.addEventListener('click',async e=>{
      if(e.target.closest('.athlete'))return;
      if(selected)await onDrop(selected);
    });
  }

  function render(){
    $('cards').innerHTML='';

    const activeDay=DAYS.find(d=>d.k===active);
    activeDay.times.forEach(time=>{
      const card=document.createElement('article');
      card.className='card';
      card.innerHTML=`<h2>${time.replace(':','h')}</h2>`;

      const poolRecords=attendance(active,time);
      const attendanceBox=document.createElement('section');
      attendanceBox.className='attendance';
      attendanceBox.innerHTML=`
        <div class="attendanceHead">
          <b>Lista de presença</b>
          <span class="attendanceCount">${poolRecords.length} aguardando barco</span>
        </div>
        <div class="addRow">
          <input list="names" placeholder="Nome do atleta" aria-label="Nome do atleta">
          <button class="addBtn">Adicionar</button>
        </div>
        <div class="pool ${poolRecords.length?'':'empty'}"></div>
        <p class="hint">Os nomes restantes aqui ainda não foram alocados.</p>`;

      const addInput=attendanceBox.querySelector('input');
      const addButton=attendanceBox.querySelector('.addBtn');
      const add=()=>addPresence(active,time,addInput.value,addInput);
      addButton.onclick=add;
      addInput.addEventListener('keydown',e=>{if(e.key==='Enter')add()});

      const pool=attendanceBox.querySelector('.pool');
      poolRecords.forEach(r=>pool.appendChild(athleteChip(r,true)));
      makeDropZone(pool,r=>moveRecord(r,'attendance',poolIndex(active,time),null));

      card.appendChild(attendanceBox);

      BOATS.forEach(boat=>{
        const filled=Array.from({length:boat.n},(_,i)=>assigned(active,time,boat.k,i)).filter(Boolean).length;
        const box=document.createElement('section');
        box.className='boat'+(boat.n===1?' single':'')+(filled===boat.n?' complete':'');
        box.innerHTML=`<div class="boatTitle"><b>${boat.l}</b><span>${filled}/${boat.n}</span></div><div class="seats"></div>`;
        const seats=box.querySelector('.seats');

        for(let i=0;i<boat.n;i++){
          const row=document.createElement('div');
          row.className='seat';
          if(boat.sides){
            const side=document.createElement('span');
            side.className='side';
            side.textContent=boat.sides[i];
            row.appendChild(side);
          }

          const occupying=assigned(active,time,boat.k,i);
          const slot=document.createElement('div');
          slot.className='seatSlot'+(occupying?'':' empty');
          slot.dataset.placeholder=boat.sides
            ? (boat.sides[i]==='BB'?'Cadê meu Bombordo?':'Cadê meu Boreste?')
            : 'Vaga';

          if(occupying)slot.appendChild(athleteChip(occupying,false));
          makeDropZone(slot,r=>moveRecord(r,boat.k,i,boat.sides?boat.sides[i]:null));

          row.appendChild(slot);
          seats.appendChild(row);
        }
        card.appendChild(box);
      });

      $('cards').appendChild(card);
    });
  }

  async function load(){
    status('Carregando…');

    const [assignmentsResult,attendanceResult]=await Promise.all([
      db.from('boat_assignments').select('*').eq('week_start',iso(monday)),
      db.from(ATTENDANCE_TABLE).select('*').eq('week_start',iso(monday))
    ]);

    if(assignmentsResult.error){
      status('Erro');
      message(assignmentsResult.error.message,true);
      return;
    }

    if(attendanceResult.error){
      status('Erro');
      message('A tabela de presença ainda não foi criada no Supabase. Execute o arquivo SQL da fase 2.',true);
      return;
    }

    records=assignmentsResult.data||[];
    attendanceRecords=attendanceResult.data||[];
    selected=null;
    render();
    status('Online');
  }

  async function addPresence(day,time,raw,input){
    const name=norm(raw);
    if(!name)return;

    const exists=[
      ...attendanceRecords.filter(r=>r.day_key===day&&r.time_key===time),
      ...current(day,time)
    ].some(r=>sameName(r.athlete_name,name));

    if(exists){
      input.value='';
      input.placeholder=`${name} já está na lista desse horário`;
      message(`${name} já está presente nesse horário.`,true);
      setTimeout(()=>input.placeholder='Nome do atleta',2200);
      return;
    }

    status('Salvando…');
    const row={
      week_start:iso(monday),
      day_key:day,
      time_key:time,
      athlete_name:name,
      position:poolIndex(day,time),
      updated_at:new Date().toISOString()
    };

    const {data,error}=await db.from(ATTENDANCE_TABLE).insert(row).select().single();

    if(error){
      status('Erro');
      message(error.message,true);
      return;
    }

    attendanceRecords.push(data);
    input.value='';
    status('Salvo');
    render();
    loadNames();
  }

  async function moveRecord(record,boatKey,seatIndex,side){
    if(record.day_key!==active)return;

    const isAttendanceRecord=Object.prototype.hasOwnProperty.call(record,'position');

    if(boatKey==='attendance'){
      if(isAttendanceRecord){
        selected=null;
        render();
        return;
      }

      status('Salvando…');

      const attendanceRow={
        week_start:record.week_start,
        day_key:record.day_key,
        time_key:record.time_key,
        athlete_name:record.athlete_name,
        position:poolIndex(record.day_key,record.time_key),
        updated_at:new Date().toISOString()
      };

      const insertResult=await db.from(ATTENDANCE_TABLE).insert(attendanceRow).select().single();
      if(insertResult.error){
        status('Erro');
        message(insertResult.error.message,true);
        return;
      }

      const deleteResult=await db.from('boat_assignments').delete().eq('id',record.id);
      if(deleteResult.error){
        await db.from(ATTENDANCE_TABLE).delete().eq('id',insertResult.data.id);
        status('Erro');
        message(deleteResult.error.message,true);
        return;
      }

      records=records.filter(r=>r.id!==record.id);
      attendanceRecords.push(insertResult.data);
      selected=null;
      status('Salvo');
      render();
      return;
    }

    const target=assigned(active,record.time_key,boatKey,seatIndex);
    if(target && target.id!==record.id){
      message('Esse assento já está ocupado.',true);
      return;
    }

    status('Salvando…');

    if(isAttendanceRecord){
      const assignmentRow={
        week_start:record.week_start,
        day_key:record.day_key,
        time_key:record.time_key,
        boat_key:boatKey,
        seat_index:seatIndex,
        side,
        athlete_name:record.athlete_name,
        updated_at:new Date().toISOString()
      };

      const insertResult=await db.from('boat_assignments').insert(assignmentRow).select().single();
      if(insertResult.error){
        status('Erro');
        message(insertResult.error.message,true);
        return;
      }

      const deleteResult=await db.from(ATTENDANCE_TABLE).delete().eq('id',record.id);
      if(deleteResult.error){
        await db.from('boat_assignments').delete().eq('id',insertResult.data.id);
        status('Erro');
        message(deleteResult.error.message,true);
        return;
      }

      attendanceRecords=attendanceRecords.filter(r=>r.id!==record.id);
      records.push(insertResult.data);
    }else{
      const {data,error}=await db.from('boat_assignments')
        .update({
          boat_key:boatKey,
          seat_index:seatIndex,
          side,
          updated_at:new Date().toISOString()
        })
        .eq('id',record.id)
        .select()
        .single();

      if(error){
        status('Erro');
        message(error.message,true);
        return;
      }

      const idx=records.findIndex(r=>r.id===record.id);
      records[idx]=data;
    }

    selected=null;
    status('Salvo');
    render();
  }

  async function removePresence(record){
    if(!confirm(`Remover ${record.athlete_name} desse horário?`))return;
    status('Salvando…');

    const {error}=await db.from(ATTENDANCE_TABLE).delete().eq('id',record.id);
    if(error){
      status('Erro');
      message(error.message,true);
      return;
    }

    attendanceRecords=attendanceRecords.filter(r=>r.id!==record.id);
    selected=null;
    status('Salvo');
    render();
  }

  async function copyPrev(){
    if(!confirm('Copiar a semana anterior e substituir a atual?'))return;
    const prev=iso(addDays(monday,-7)),cur=iso(monday);
    const [{data,error},{data:attendanceData,error:attendanceError}]=await Promise.all([
      db.from('boat_assignments').select('*').eq('week_start',prev),
      db.from(ATTENDANCE_TABLE).select('*').eq('week_start',prev)
    ]);
    if(error)return message(error.message,true);
    if(attendanceError)return message(attendanceError.message,true);
    await Promise.all([
      db.from('boat_assignments').delete().eq('week_start',cur),
      db.from(ATTENDANCE_TABLE).delete().eq('week_start',cur)
    ]);
    if(data?.length){
      const rows=data.map(({id,created_at,...r})=>({...r,week_start:cur,updated_at:new Date().toISOString()}));
      const res=await db.from('boat_assignments').insert(rows);
      if(res.error)return message(res.error.message,true);
    }
    if(attendanceData?.length){
      const attendanceRows=attendanceData.map(({id,created_at,...r})=>({...r,week_start:cur,updated_at:new Date().toISOString()}));
      const res=await db.from(ATTENDANCE_TABLE).insert(attendanceRows);
      if(res.error)return message(res.error.message,true);
    }
    await load();message('Semana anterior copiada.');
  }

  async function clearWeek(){
    if(!confirm('Apagar presença e barcos desta semana?'))return;
    const [assignmentsDelete,attendanceDelete]=await Promise.all([
      db.from('boat_assignments').delete().eq('week_start',iso(monday)),
      db.from(ATTENDANCE_TABLE).delete().eq('week_start',iso(monday))
    ]);
    if(assignmentsDelete.error)return message(assignmentsDelete.error.message,true);
    if(attendanceDelete.error)return message(attendanceDelete.error.message,true);
    records=[];attendanceRecords=[];selected=null;render();message('Semana limpa.');
  }

  function roundedRect(ctx,x,y,w,h,r){
    const radius=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+radius,y);
    ctx.arcTo(x+w,y,x+w,y+h,radius);ctx.arcTo(x+w,y+h,x,y+h,radius);
    ctx.arcTo(x,y+h,x,y,radius);ctx.arcTo(x,y,x+w,y,radius);ctx.closePath()
  }
  function fitText(ctx,text,maxWidth,minSize=18){
    let size=parseInt(ctx.font,10)||25;
    while(size>minSize&&ctx.measureText(text).width>maxWidth){size--;ctx.font=ctx.font.replace(/\d+px/,`${size}px`)}
  }
  function reportName(day,time,boat,index){
    return assigned(day,time,boat,index)?.athlete_name||'';
  }

  function drawWaitingList(ctx,{x,y,w,day,time}){
    const waiting=attendance(day,time).map(r=>r.athlete_name);

    ctx.textAlign='left';
    ctx.fillStyle='#0d2d39';
    ctx.font='700 27px Arial';
    ctx.fillText('AGUARDANDO BARCO',x,y);

    ctx.textAlign='right';
    ctx.fillStyle=waiting.length?'#e26f18':'#4f7f32';
    ctx.font='700 25px Arial';
    ctx.fillText(String(waiting.length),x+w,y);

    ctx.strokeStyle='rgba(13,45,57,.24)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(x,y+16);
    ctx.lineTo(x+w,y+16);
    ctx.stroke();

    if(!waiting.length){
      ctx.textAlign='left';
      ctx.fillStyle='rgba(13,45,57,.55)';
      ctx.font='italic 23px Arial';
      ctx.fillText('Ninguém aguardando',x,y+58);
      return 92;
    }

    let currentX=x;
    let currentY=y+42;
    const chipH=42;
    const chipGap=8;
    const maxRows=3;
    let rows=1;

    waiting.forEach((name,idx)=>{
      ctx.font='700 21px Arial';
      const chipW=Math.min(w,Math.max(118,ctx.measureText(name).width+34));

      if(currentX+chipW>x+w){
        rows+=1;
        currentX=x;
        currentY+=chipH+chipGap;
      }

      if(rows>maxRows)return;

      roundedRect(ctx,currentX,currentY,chipW,chipH,10);
      ctx.fillStyle='#e28d49';
      ctx.fill();

      ctx.textAlign='center';
      ctx.fillStyle='#171717';
      ctx.font='700 21px Arial';
      fitText(ctx,name,chipW-24,17);
      ctx.fillText(name,currentX+chipW/2,currentY+28);

      currentX+=chipW+chipGap;
    });

    return 62+Math.min(rows,maxRows)*(chipH+chipGap);
  }
  function drawBoatBlock(ctx,{x,y,w,boat,day,time}){
    const names=Array.from({length:boat.n},(_,i)=>reportName(day,time,boat.k,i));
    const filled=names.filter(Boolean).length;
    ctx.fillStyle='#0d2d39';ctx.font='700 30px Arial';ctx.textAlign='left';ctx.fillText(boat.l,x,y);
    ctx.textAlign='right';ctx.fillStyle=filled===boat.n?'#4f7f32':'#e26f18';ctx.font='700 29px Arial';ctx.fillText(`${filled}/${boat.n}`,x+w,y);
    ctx.strokeStyle='rgba(13,45,57,.24)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y+18);ctx.lineTo(x+w,y+18);ctx.stroke();
    const rowH=43;
    for(let i=0;i<boat.n;i++){
      const rowY=y+54+i*rowH,side=boat.sides?boat.sides[i]:String(i+1),name=names[i]||'VAGA';
      roundedRect(ctx,x,rowY-27,35,34,7);ctx.fillStyle='#0d2d39';ctx.fill();
      ctx.fillStyle='#f7f3ec';ctx.font='700 19px Arial';ctx.textAlign='center';ctx.fillText(side,x+17.5,rowY-3);
      ctx.textAlign='left';ctx.fillStyle=names[i]?'#102d38':'#df641d';ctx.font=names[i]?'500 25px Arial':'700 24px Arial';fitText(ctx,name,w-58,19);ctx.fillText(name,x+50,rowY);
      ctx.strokeStyle='rgba(13,45,57,.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+50,rowY+10);ctx.lineTo(x+w,rowY+10);ctx.stroke();
    }
    return 72+boat.n*rowH;
  }
  async function generateImage(){
    try{
      status('Gerando imagem…');
      const W=2160,H=3520,canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;
      const ctx=canvas.getContext('2d'),bg='#082b3a',panel='#f7f3ec',darkPanel='#123f52',text='#f7f3ec',accent='#e28d49';
      ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';ctx.fillStyle=text;ctx.font='700 112px Georgia';ctx.fillText('BARCOS DA SEMANA',W/2,150);
      ctx.fillStyle=accent;ctx.fillRect(W/2-70,190,140,8);ctx.font='700 58px Arial';ctx.fillText(`${fmt(monday)} a ${fmt(addDays(monday,5))}`,W/2,278);
      const left=170,top=350,labelW=120,gap=8,colW=(W-left-50-labelW-gap*5)/5,headerH=135,rowGap=16,rowH=1415;
      DAYS.forEach((d,idx)=>{
        const x=left+labelW+gap+idx*(colW+gap);roundedRect(ctx,x,top,colW,headerH,20);ctx.fillStyle=darkPanel;ctx.fill();
        ctx.textAlign='center';ctx.fillStyle=text;ctx.font='700 37px Arial';ctx.fillText(d.l.replace('-feira','').toUpperCase(),x+colW/2,top+55);
        ctx.fillStyle=accent;ctx.font='700 31px Arial';ctx.fillText(fmt(addDays(monday,d.o)),x+colW/2,top+101);
      });

      const reportRows=[
        {label:'1º HORÁRIO',timeForDay:d=>d.k==='sat'?'07:00':'06:30'},
        {label:'2º HORÁRIO',timeForDay:d=>d.k==='sat'?'08:00':'07:30'}
      ];

      reportRows.forEach((row,timeIdx)=>{
        const y=top+headerH+rowGap+timeIdx*(rowH+rowGap);
        roundedRect(ctx,25,y,labelW+110,rowH,20);ctx.fillStyle=darkPanel;ctx.fill();
        ctx.save();ctx.translate(110,y+rowH/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';ctx.fillStyle=text;ctx.font='700 48px Arial';ctx.fillText(row.label,0,0);ctx.restore();

        DAYS.forEach((d,dayIdx)=>{
          const time=row.timeForDay(d);
          const x=left+labelW+gap+dayIdx*(colW+gap);roundedRect(ctx,x,y,colW,rowH,20);ctx.fillStyle=panel;ctx.fill();

          ctx.textAlign='center';
          ctx.fillStyle=accent;
          ctx.font='700 30px Arial';
          ctx.fillText(time.replace(':','h'),x+colW/2,y+38);

          let currentY=y+82,innerX=x+24,innerW=colW-48;

          currentY+=drawWaitingList(ctx,{
            x:innerX,
            y:currentY,
            w:innerW,
            day:d.k,
            time
          })+22;

          BOATS.forEach((boat,boatIdx)=>{
            currentY+=drawBoatBlock(ctx,{
              x:innerX,
              y:currentY,
              w:innerW,
              boat,
              day:d.k,
              time
            })+(boatIdx===BOATS.length-1?0:18);
          });
        });
      });
      ctx.textAlign='center';ctx.fillStyle='rgba(247,243,236,.76)';ctx.font='400 30px Arial';ctx.fillText('Na Caravela, BB/BE indicam apenas os bordos, não voga ou proa.',W/2,H-55);
      const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/png',1));if(!blob)throw new Error('Não foi possível criar a imagem.');
      const url=URL.createObjectURL(blob),link=document.createElement('a');link.href=url;link.download=`barcos-${iso(monday)}.png`;document.body.appendChild(link);link.click();link.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);
      status('Online');message('Imagem da semana gerada.');
    }catch(error){status('Erro');message(error.message||'Não foi possível gerar a imagem.',true)}
  }

  async function loadNames(){
    const [assignmentsResult,attendanceResult]=await Promise.all([
      db.from('boat_assignments').select('athlete_name').neq('athlete_name','').limit(2000),
      db.from(ATTENDANCE_TABLE).select('athlete_name').neq('athlete_name','').limit(2000)
    ]);

    const all=[
      ...(assignmentsResult.data||[]),
      ...(attendanceResult.data||[])
    ];

    const unique=[...new Set(all.map(x=>x.athlete_name).filter(Boolean))]
      .sort((a,b)=>a.localeCompare(b,'pt-BR'));

    $('names').innerHTML='';
    unique.forEach(n=>{
      const o=document.createElement('option');
      o.value=n;
      $('names').appendChild(o);
    });
  }

  $('prev').onclick=()=>{monday=addDays(monday,-7);renderHead();load()};
  $('next').onclick=()=>{monday=addDays(monday,7);renderHead();load()};
  $('reload').onclick=load;
  $('copyPrev').onclick=copyPrev;
  $('clear').onclick=clearWeek;
  $('makeImage').onclick=generateImage;

  renderHead();render();load();loadNames();
</script>
